<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Welcome back — Rencana</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f8fafc;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
        --primary: #2563eb;
        --border: #e2e8f0;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0b1020;
          --card: #11172a;
          --text: #f8fafc;
          --muted: #94a3b8;
          --primary: #60a5fa;
          --border: #1f2937;
        }
      }
      * { box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 32px 28px;
        max-width: 420px;
        width: 100%;
        text-align: center;
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
      }
      .logo {
        width: 64px;
        height: 64px;
        margin: 0 auto 20px;
        border-radius: 16px;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        color: #fff;
        font-weight: 800;
      }
      h1 {
        font-size: 22px;
        margin: 0 0 8px;
        letter-spacing: -0.4px;
      }
      p {
        color: var(--muted);
        font-size: 15px;
        line-height: 1.5;
        margin: 0 0 16px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: var(--primary);
        color: #fff;
        text-decoration: none;
        padding: 14px 24px;
        border-radius: 12px;
        font-weight: 600;
        font-size: 16px;
        margin: 16px 0 4px;
        transition: opacity 0.15s;
      }
      .btn:active { opacity: 0.85; }
      .stores {
        display: flex;
        gap: 8px;
        justify-content: center;
        flex-wrap: wrap;
        margin-top: 20px;
      }
      .stores a {
        color: var(--primary);
        text-decoration: none;
        font-size: 13px;
        font-weight: 500;
        padding: 8px 12px;
        border-radius: 8px;
        border: 1px solid var(--border);
      }
      .small { font-size: 13px; color: var(--muted); margin-top: 24px; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">R</div>
      <h1 id="title">Email confirmed!</h1>
      <p id="msg">Opening Rencana now…</p>
      <a id="openApp" class="btn" href="rencana://login">Open in Rencana</a>
      <div class="stores">
        <a href="https://apps.apple.com/app/rencana/id6762103809">Get on App Store</a>
        <a href="https://play.google.com/store/apps/details?id=com.aizztech.rencana">Get on Google Play</a>
      </div>
      <p class="small">If the app is installed, it should open automatically. Otherwise, install it and tap <strong>Open in Rencana</strong> above.</p>
    </div>
    <script>
      (function () {
        // Forward any auth params (access_token, refresh_token, type, error, etc.)
        // from both query (?…) and fragment (#…) to the deep link, so the app
        // can complete the session client-side if Supabase ever switches to
        // implicit/hash-based redirects.
        var search = (window.location.search || '').replace(/^\?/, '');
        var hash = (window.location.hash || '').replace(/^#/, '');
        var combined = [search, hash].filter(Boolean).join('&');
        var deep = 'rencana://login' + (combined ? '?' + combined : '');

        var openApp = document.getElementById('openApp');
        openApp.href = deep;

        // Try to launch the app immediately. iOS Safari blocks programmatic
        // location changes that aren't user-initiated, so we also keep the
        // visible "Open in Rencana" button as a fallback.
        setTimeout(function () {
          try { window.location.href = deep; } catch (e) {}
        }, 80);

        // After ~2s, if we're still on this page, assume the app isn't installed
        // and emphasise the install CTAs.
        setTimeout(function () {
          if (!document.hidden) {
            document.getElementById('msg').textContent =
              'If nothing happened, the app may not be installed. Get it below, then come back and tap Open in Rencana.';
          }
        }, 2200);
      })();
    </script>
  </body>
</html>
