# Deploy with: npx supabase functions deploy extract_sow --project-ref <your-ref>
#
# Kong validates JWT at the edge by default. That can return "Invalid JWT" (401)
# even when the app anon key and user session are valid for Storage/REST.
# This function already calls auth.getUser() with the request Authorization header.
[functions.extract_sow]
verify_jwt = false

[functions.extract_timetable]
verify_jwt = false

[functions.fetch_timetable]
verify_jwt = false

# Validates JWT inside the function via auth.getUser (same pattern as extract_sow).
[functions.delete_account]
verify_jwt = false

[functions.admin_test_fetch]
verify_jwt = false

[functions.admin_users]
verify_jwt = false

[functions.admin_data]
verify_jwt = false

[functions.admin_community_push]
verify_jwt = false

[functions.community-push]
verify_jwt = false

# AI functions validate JWT inside function via auth.getUser(token).
# Keep edge gateway verification off to avoid false "Invalid JWT" rejections.
[functions.ai_generate]
verify_jwt = false

[functions.ai_pdf_extract]
verify_jwt = false

[functions.generate_flashcards]
verify_jwt = false

[functions.ai_embed]
enabled = true
verify_jwt = true
import_map = "./functions/ai_embed/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/ai_embed/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/ai_embed/*.html" ]
